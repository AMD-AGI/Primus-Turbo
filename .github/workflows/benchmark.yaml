name: Primus-Turbo-Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  BENCHMARK_ROOT_DIR: /wekafs/primus_turbo/benchmark

jobs:
  benchmark-pytorch-gfx942:
    runs-on: turbo-pt-bench-gfx942-2510-kfpfd
    env:
      GPU_NAME: MI325  # Change this to your GPU model
    steps:
      - run: echo "🎉 Begin Primus-Turbo Benchmark."
      - name: Change owner
        run: |
          echo "change the owner of all primus-turbo files, as some files are generated by root"
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          sudo chown -R $(id -u):$(id -g) ${GITHUB_WORKSPACE}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: 'recursive'
      - name: Print dir
        run: |
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          echo "current dir: $(pwd)"
      - name: Print rocminfo
        run: |
          echo "=== rocminfo ==="
          rocminfo || true
      - name: Install Primus-Turbo
        run: |
          unset AITER_ASM_DIR
          pip3 uninstall -y aiter || true
          pip3 install -r requirements.txt
          GPU_ARCHS="gfx942" PRIMUS_TURBO_FRAMEWORK="PYTORCH" pip3 install --no-build-isolation -e . -v
      - name: Create benchmark output directory
        run: |
          BENCHMARK_DATE=$(date +%Y%m%d)
          BENCHMARK_DATE_DIR="${BENCHMARK_ROOT_DIR}/${BENCHMARK_DATE}"
          BENCHMARK_OUTPUT_DIR="${BENCHMARK_DATE_DIR}/${GPU_NAME}"
          mkdir -p "${BENCHMARK_OUTPUT_DIR}"
          mkdir -p "${BENCHMARK_DATE_DIR}/H200"
          echo "BENCHMARK_DATE_DIR=${BENCHMARK_DATE_DIR}" >> $GITHUB_ENV
          echo "BENCHMARK_OUTPUT_DIR=${BENCHMARK_OUTPUT_DIR}" >> $GITHUB_ENV

      - name: "[1] Attention Benchmarks"
        timeout-minutes: 90
        continue-on-error: true
        run: |
          HIP_VISIBLE_DEVICES=0 python3 benchmark/ops/bench_attention_torch.py \
            -o "${BENCHMARK_OUTPUT_DIR}/attention_torch_benchmark.csv" &                       # GPU0: PyTorch Baseline
          HIP_VISIBLE_DEVICES=1 python3 benchmark/ops/bench_attention_turbo.py \
            -o "${BENCHMARK_OUTPUT_DIR}/attention_benchmark.csv" &                             # GPU1: Aiter/CK
          HIP_VISIBLE_DEVICES=2 python3 benchmark/ops/bench_attention_turbo.py --fp8 \
            -o "${BENCHMARK_OUTPUT_DIR}/attention_fp8_benchmark.csv" &                         # GPU2: FP8
          HIP_VISIBLE_DEVICES=3 python3 benchmark/ops/bench_attention_turbo.py --deterministic \
            -o "${BENCHMARK_OUTPUT_DIR}/attention_deterministic_benchmark.csv" &               # GPU3: Deterministic
          wait

      - name: "[2] GEMM BF16 Benchmarks"
        timeout-minutes: 90
        continue-on-error: true
        run: |
          HIP_VISIBLE_DEVICES=0 python3 benchmark/ops/bench_gemm_torch.py --dtype bf16 \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_torch_benchmark.csv" &                            # GPU0: PyTorch Baseline
          HIP_VISIBLE_DEVICES=1 python3 benchmark/ops/bench_gemm_te.py --dtype bf16 \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_te_benchmark.csv" &                               # GPU1: TE Baseline
          HIP_VISIBLE_DEVICES=2 python3 benchmark/ops/bench_gemm_turbo.py --dtype bf16 \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_hipblaslt_benchmark.csv" &                        # GPU2: Hipblaslt
          HIP_VISIBLE_DEVICES=3 PRIMUS_TURBO_GEMM_BACKEND=TRITON \
            python3 benchmark/ops/bench_gemm_turbo.py --dtype bf16 \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_triton_benchmark.csv" &                           # GPU3: Triton
          wait

      - name: "[3] GEMM FP8 Benchmarks"
        timeout-minutes: 120
        continue-on-error: true
        run: |
          # Wave 1: Tensorwise (6 parallel on GPU 0-5)
          HIP_VISIBLE_DEVICES=0 python3 benchmark/ops/bench_gemm_torch.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_tensorwise_torch_benchmark.csv" &             # GPU0: Tensorwise PyTorch
          HIP_VISIBLE_DEVICES=1 python3 benchmark/ops/bench_gemm_te.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_tensorwise_te_benchmark.csv" &                # GPU1: Tensorwise TE
          HIP_VISIBLE_DEVICES=2 PRIMUS_TURBO_GEMM_BACKEND=HIPBLASLT \
            python3 benchmark/ops/bench_gemm_turbo.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_tensorwise_hipblaslt_benchmark.csv" &         # GPU2: Tensorwise Hipblaslt
          HIP_VISIBLE_DEVICES=3 PRIMUS_TURBO_GEMM_BACKEND=CK \
            python3 benchmark/ops/bench_gemm_turbo.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_tensorwise_ck_benchmark.csv" &                # GPU3: Tensorwise CK
          HIP_VISIBLE_DEVICES=4 PRIMUS_TURBO_GEMM_BACKEND=TRITON \
            python3 benchmark/ops/bench_gemm_turbo.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_tensorwise_triton_benchmark.csv" &            # GPU4: Tensorwise Triton
          HIP_VISIBLE_DEVICES=5 PRIMUS_TURBO_AUTO_TUNE=1 \
            python3 benchmark/ops/bench_gemm_turbo.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_tensorwise_autotune_benchmark.csv" &          # GPU5: Tensorwise AutoTune
          wait
          # Wave 2: Rowwise + Blockwise (4 parallel on GPU 0-3)
          HIP_VISIBLE_DEVICES=0 PRIMUS_TURBO_GEMM_BACKEND=CK \
            python3 benchmark/ops/bench_gemm_turbo.py \
            --dtype fp8 --granularity rowwise \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_rowwise_ck_benchmark.csv" &                   # GPU0: Rowwise CK
          HIP_VISIBLE_DEVICES=1 PRIMUS_TURBO_GEMM_BACKEND=TRITON \
            python3 benchmark/ops/bench_gemm_turbo.py \
            --dtype fp8 --granularity rowwise \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_rowwise_triton_benchmark.csv" &               # GPU1: Rowwise Triton
          HIP_VISIBLE_DEVICES=2 PRIMUS_TURBO_GEMM_BACKEND=CK \
            python3 benchmark/ops/bench_gemm_turbo.py \
            --dtype fp8 --granularity blockwise \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_blockwise_ck_benchmark.csv" &                 # GPU2: Blockwise CK
          HIP_VISIBLE_DEVICES=3 PRIMUS_TURBO_GEMM_BACKEND=TRITON \
            python3 benchmark/ops/bench_gemm_turbo.py \
            --dtype fp8 --granularity blockwise \
            -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_blockwise_triton_benchmark.csv" &             # GPU3: Blockwise Triton
          wait
      # - name: Run GEMM FP8 MX Benchmark
      #   timeout-minutes: 60
      #   continue-on-error: true
      #   run: python3 benchmark/ops/bench_gemm_turbo.py --dtype fp8 --granularity mx -o "${BENCHMARK_OUTPUT_DIR}/gemm_fp8_mx_benchmark.csv"

      # ── [4] Grouped GEMM BF16 Benchmarks (5 parallel on GPU 0-4) ──
      # - name: "[4] Run Grouped GEMM Benchmark (PyTorch Baseline)"
      #   timeout-minutes: 60
      #   continue-on-error: true
      #   run: python3 benchmark/ops/bench_grouped_gemm_torch.py -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_torch_benchmark.csv"
      - name: "[4] Grouped GEMM BF16 Benchmarks"
        timeout-minutes: 90
        continue-on-error: true
        run: |
          HIP_VISIBLE_DEVICES=0 python3 benchmark/ops/bench_grouped_gemm_te.py --dtype bf16 \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_te_benchmark.csv" &                       # GPU0: TE Baseline
          HIP_VISIBLE_DEVICES=1 PRIMUS_TURBO_GROUPED_GEMM_BACKEND=HIPBLASLT \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py --dtype bf16 \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_hipblaslt_benchmark.csv" &                # GPU1: Hipblaslt
          HIP_VISIBLE_DEVICES=2 PRIMUS_TURBO_GROUPED_GEMM_BACKEND=CK \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py --dtype bf16 \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_ck_benchmark.csv" &                       # GPU2: CK
          HIP_VISIBLE_DEVICES=3 PRIMUS_TURBO_GROUPED_GEMM_BACKEND=TRITON \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py --dtype bf16 \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_triton_benchmark.csv" &                   # GPU3: Triton
          HIP_VISIBLE_DEVICES=4 PRIMUS_TURBO_AUTO_TUNE=1 \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py --dtype bf16 \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_autotune_benchmark.csv" &                 # GPU4: AutoTune
          wait

      - name: "[5] Grouped GEMM FP8 Benchmarks"
        timeout-minutes: 120
        continue-on-error: true
        run: |
          # Wave 1: Tensorwise (5 parallel on GPU 0-4)
          HIP_VISIBLE_DEVICES=0 python3 benchmark/ops/bench_grouped_gemm_te.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_fp8_tensorwise_te_benchmark.csv" &        # GPU0: Tensorwise TE
          HIP_VISIBLE_DEVICES=1 PRIMUS_TURBO_GROUPED_GEMM_BACKEND=HIPBLASLT \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_fp8_tensorwise_hipblaslt_benchmark.csv" & # GPU1: Tensorwise Hipblaslt
          HIP_VISIBLE_DEVICES=2 PRIMUS_TURBO_GROUPED_GEMM_BACKEND=CK \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_fp8_tensorwise_ck_benchmark.csv" &        # GPU2: Tensorwise CK
          HIP_VISIBLE_DEVICES=3 PRIMUS_TURBO_GROUPED_GEMM_BACKEND=TRITON \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_fp8_tensorwise_triton_benchmark.csv" &    # GPU3: Tensorwise Triton
          HIP_VISIBLE_DEVICES=4 PRIMUS_TURBO_AUTO_TUNE=1 \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py \
            --dtype fp8 --granularity tensorwise \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_fp8_tensorwise_autotune_benchmark.csv" &  # GPU4: Tensorwise AutoTune
          wait
          # Wave 2: Rowwise + Blockwise (4 parallel on GPU 0-3)
          HIP_VISIBLE_DEVICES=0 PRIMUS_TURBO_GROUPED_GEMM_BACKEND=CK \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py \
            --dtype fp8 --granularity rowwise \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_fp8_rowwise_ck_benchmark.csv" &           # GPU0: Rowwise CK
          HIP_VISIBLE_DEVICES=1 PRIMUS_TURBO_GROUPED_GEMM_BACKEND=TRITON \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py \
            --dtype fp8 --granularity rowwise \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_fp8_rowwise_triton_benchmark.csv" &       # GPU1: Rowwise Triton
          HIP_VISIBLE_DEVICES=2 PRIMUS_TURBO_GROUPED_GEMM_BACKEND=CK \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py \
            --dtype fp8 --granularity blockwise \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_fp8_blockwise_ck_benchmark.csv" &         # GPU2: Blockwise CK
          HIP_VISIBLE_DEVICES=3 PRIMUS_TURBO_GROUPED_GEMM_BACKEND=TRITON \
            python3 benchmark/ops/bench_grouped_gemm_turbo.py \
            --dtype fp8 --granularity blockwise \
            -o "${BENCHMARK_OUTPUT_DIR}/grouped_gemm_fp8_blockwise_triton_benchmark.csv" &     # GPU3: Blockwise Triton
          wait

      - name: "[6] DeepEP Intranode Benchmark"
        timeout-minutes: 60
        continue-on-error: true
        run: python3 benchmark/ops/bench_deepep_intranode.py --backend turbo -o "${BENCHMARK_OUTPUT_DIR}/deep_ep_intranode_turbo_benchmark.csv"

      - name: "Copy H200 benchmark data"
        run: |
          H200_LATEST_DIR="${BENCHMARK_ROOT_DIR}/H200/latest"
          H200_OUTPUT_DIR="${BENCHMARK_DATE_DIR}/H200"
          if [ -d "${H200_LATEST_DIR}" ]; then
            cp -v ${H200_LATEST_DIR}/*.csv "${H200_OUTPUT_DIR}/" || true
          else
            echo "Warning: H200 latest directory not found: ${H200_LATEST_DIR}"
          fi
      - name: "Generate Summary Report"
        run: |
          BENCHMARK_DATE=$(date +%Y-%m-%d)
          python3 benchmark/ops/summarize_results.py --data-dir "${BENCHMARK_DATE_DIR}" --gpu MI325 H200 --date "${BENCHMARK_DATE}" -o "${BENCHMARK_DATE_DIR}/summary.csv"
